<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand AI - AI Chatbot</title>
    <!--Linking wiht the Google fonts for icons-->
    <link rel="icon" type="image/png" href="image/chatbot.png" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/body.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <span class="material-symbols-rounded">robot_2</span>
                    <h2>Grand AI</h2>
                </div>
                <p id="auth-subtitle">Welcome back! Please login to continue.</p>
            </div>

            <div class="auth-toggle">
                <button id="toggle-login" class="active">Login</button>
                <button id="toggle-signup">Sign Up</button>
            </div>

            <form id="auth-form">
                <div class="input-group">
                    <span class="material-symbols-rounded">mail</span>
                    <input type="email" id="auth-email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <span class="material-symbols-rounded">lock</span>
                    <input type="password" id="auth-password" placeholder="Password" required>
                </div>

                <div class="input-group hidden" id="confirm-password-group">
                    <span class="material-symbols-rounded">lock_reset</span>
                    <input type="password" id="auth-confirm-password" placeholder="Confirm Password">
                </div>

                <p id="auth-error" class="auth-error hidden">Passwords do not match!</p>

                <button type="submit" id="auth-submit-btn">Login</button>
            </form>
        </div>
    </div>

    <button id="chatbot-toggler">
        <span class="material-symbols-rounded">mode_comment</span>
        <span class="material-symbols-rounded">close</span>
    </button>
    <div class="chatbot-popup">
        <!--ChatBot Header-->
        <div class="chat-header">
            <div class="header-info">
                <svg class="chatbot-logo" xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 1024 1024">
                    <path d="M738.3 287.6H285.7c-59 0-106.8 47.8-106.8 106.8v303.1c0 59 47.8 106.8 106.8 106.8h81.5v111.1c0 .7.8 1.1 1.4.7l166.9-110.6 41.8-.8h117.4l43.6-.4c59 0 106.8-47.8 106.8-106.8V394.5c0-59-47.8-106.9-106.8-106.9zM351.7 448.2c0-29.5 23.9-53.5 53.5-53.5s53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5-53.5-23.9-53.5-53.5zm157.9 267.1c-67.8 0-123.8-47.5-132.3-109h264.6c-8.6 61.5-64.5 109-132.3 109zm110-213.7c-29.5 0-53.5-23.9-53.5-53.5s23.9-53.5 53.5-53.5 53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5zM867.2 644.5V453.1h26.5c19.4 0 35.1 15.7 35.1 35.1v121.1c0 19.4-15.7 35.1-35.1 35.1h-26.5zM95.2 609.4V488.2c0-19.4 15.7-35.1 35.1-35.1h26.5v191.3h-26.5c-19.4 0-35.1-15.7-35.1-35.1zM561.5 149.6c0 23.4-15.6 43.3-36.9 49.7v44.9h-30v-44.9c-21.4-6.5-36.9-26.3-36.9-49.7 0-28.6 23.3-51.9 51.9-51.9s51.9 23.3 51.9 51.9z"></path>
                </svg>
                <h2 class="logo-text">Grand AI</h2>
            </div>
            <button  id="close-chatbot"class="material-symbols-rounded">keyboard_arrow_down</button>
        </div>
        <!--ChatBot Body-->
        <div class="chat-body">
            <div class="message bot-message thinking">
                <svg class="bot-avatar" xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 1024 1024">
                    <path d="M738.3 287.6H285.7c-59 0-106.8 47.8-106.8 106.8v303.1c0 59 47.8 106.8 106.8 106.8h81.5v111.1c0 .7.8 1.1 1.4.7l166.9-110.6 41.8-.8h117.4l43.6-.4c59 0 106.8-47.8 106.8-106.8V394.5c0-59-47.8-106.9-106.8-106.9zM351.7 448.2c0-29.5 23.9-53.5 53.5-53.5s53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5-53.5-23.9-53.5-53.5zm157.9 267.1c-67.8 0-123.8-47.5-132.3-109h264.6c-8.6 61.5-64.5 109-132.3 109zm110-213.7c-29.5 0-53.5-23.9-53.5-53.5s23.9-53.5 53.5-53.5 53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5zM867.2 644.5V453.1h26.5c19.4 0 35.1 15.7 35.1 35.1v121.1c0 19.4-15.7 35.1-35.1 35.1h-26.5zM95.2 609.4V488.2c0-19.4 15.7-35.1 35.1-35.1h26.5v191.3h-26.5c-19.4 0-35.1-15.7-35.1-35.1zM561.5 149.6c0 23.4-15.6 43.3-36.9 49.7v44.9h-30v-44.9c-21.4-6.5-36.9-26.3-36.9-49.7 0-28.6 23.3-51.9 51.9-51.9s51.9 23.3 51.9 51.9z"></path>
                </svg>
                <div class="message-text">
                    <p>Hi, I am Grand 👋 <br /> How can I help you today?</p>
                </div>
            </div>
        </div>

        <!--ChatBot footer-->
        <div class="chat-footer">
            <form action="#" class="chat-form">
                <textarea placeholder="Ask Anything" class="message-input" required></textarea>
                <div class="chat-controls">
    
                    <div class="tools-selector" id="tools-selector">
                        <button type="button" id="tools-toggler" class="material-symbols-rounded">add</button>
                        
                        <div class="tools-menu hidden" id="tools-menu">
                            <button type="button" id="file-upload-menu-btn">
                                <span class="material-symbols-rounded">image</span> Upload Image
                            </button>
                            <button type="button" id="emoji-picker-btn">
                                <span class="material-symbols-rounded">sentiment_satisfied</span> Emoji
                            </button>
                            <button type="button" id="clear-chat">
                                <span class="material-symbols-rounded">delete_sweep</span> Clear Chat
                            </button>
                        </div>
                    </div>

                    <div class="file-upload-wrapper">
                        <input type="file" accept="images/*" id="file-input" hidden>
                        <img src="#">
                        <button type="button" id="file-cancel" class="material-symbols-rounded">close</button>
                    </div>

                    <div class="custom-model-selector" id="model-selector-container">
                        <button type="button" class="model-toggler" id="model-toggler">
                            <span id="current-model-name">Fast</span>
                            <span class="material-symbols-rounded">keyboard_arrow_down</span>
                        </button>

                        <div class="model-menu hidden" id="model-menu">
                            <div class="model-menu-header">Gemini 3</div>

                            <div class="model-option selected" data-value="gemini-2.5-flash">
                                <div class="model-info">
                                    <span class="model-title">Fast</span>
                                    <span class="model-desc">Answers quickly</span>
                                </div>
                                <span class="material-symbols-rounded check-icon">check_circle</span>
                            </div>

                            <div class="model-option" data-value="gemini-2.5-flash-lite">
                                <div class="model-info">
                                    <span class="model-title">Thinking</span>
                                    <span class="model-desc">Solves complex problems</span>
                                </div>
                                <span class="material-symbols-rounded check-icon">check_circle</span>
                            </div>

                            <div class="model-option" data-value="gemini-2.5-pro">
                                <div class="model-info">
                                    <span class="model-title">Pro</span>
                                    <span class="model-desc">Advanced math and code</span>
                                </div>
                                <span class="material-symbols-rounded check-icon">check_circle</span>
                            </div>
                        </div>
                    </div>

                    <button type="button" id="mic-btn" class="material-symbols-rounded" title="Speak">mic</button>
                    <button type="submit" id="send-message" class="material-symbols-rounded">send</button>
                </div>
            </form>
        </div>
    </div>

    <div id="context-menu" class="hidden">
        <button id="copy-btn">
            <span class="material-symbols-rounded">content_copy</span> Copy
        </button>
        <button id="edit-btn">
            <span class="material-symbols-rounded">edit</span> Edit Message
        </button>
    </div>
    <!-- Linking Emoji Mart script for emoji picker -->
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
    
    <!--Making responses coming from API more interactive-->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Linking custom script -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
